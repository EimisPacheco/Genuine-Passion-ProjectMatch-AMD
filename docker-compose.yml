# Local stack for Multi-Agent Passion Intelligence.
# The database is GCP Cloud SQL for PostgreSQL (set DATABASE_URL in .env) — no
# local DB service needed; without it the app runs in-memory.
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: pm_backend
    env_file: .env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: pm_frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
